name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test
        run: ./mvnw -B verify
      - name: Traceability consistency gate (SIM-REQ-QA-001/002)
        run: java -cp sim-test-support/target/classes org.satsim.testsupport.trace.TraceabilityCheck --root . --milestone M1a --gate

  # Public demo image: built only after the full CI gate passed on master,
  # pushed to GHCR, then Render is told to pull it (no git clone on Render's
  # side — its shared IPs are throttled by GitHub for anonymous clones).
  deploy-demo:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build demo image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest \
                       -t ghcr.io/${{ github.repository }}:${GITHUB_SHA::7} .
      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker push --all-tags ghcr.io/${{ github.repository }}
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS "$HOOK" > /dev/null && echo "Render deploy triggered"
          else
            echo "RENDER_DEPLOY_HOOK_URL not configured — skipping trigger"
          fi
