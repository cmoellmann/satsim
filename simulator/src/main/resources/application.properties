# Default port 8090: 8080 is taken by another project on the dev machine.
server.port=8090

# Interactive pacing (org.satsim.sim.pacing): simulated milliseconds advanced
# per wall-clock tick; 1:1 real-time pacing for frontend use. 0 disables
# pacing entirely (simulated time then advances only on explicit calls;
# used by deterministic web-API tests).
satsim.pacing.tick-millis=20
